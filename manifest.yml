name: RStudio Server
# site-specific: may change to conform to your site's category
category: Interactive Apps
subcategory: Web Apps
role: batch_connect
# site-specific: change link to documentation
description: |
  This app will launch a single-node [RStudio Server](https://www.rstudio.com/products/rstudio-server/) instance on a compute node.
  This app provides a common software environment for R packages, including geospatial and biological packages.

  See [RStudio Server OOD app](https://docs.rc.fas.harvard.edu/kb/rstudio-server-vs-rstudio-desktop) for more information.

  * User-installed R libraries will be installed in *~/R/ifxrstudio/\<IMAGE_TAG\>*.
