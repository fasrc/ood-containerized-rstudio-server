---
title: "RStudio Server"
# site-specific: change cluster name
cluster: "fasse"
attributes:
  modules: null
  custom_time:
    label: "Allocated Time (expressed in MM , or HH:MM:SS , or DD-HH:MM)"
    value: "04:00:00"
    widget: text_field
    help: |
      *sbatch -t, --time=\<time\>*
  bc_queue: 
# site-specific: change default partition
    value: "test"
    help: |
      *sbatch -p, --partition=\<partition_names\>*

      [Slurm partition](https://docs.rc.fas.harvard.edu/kb/fasse/#SLURM_and_Partitions) name (e.g., **fasse** ), or comma-separated list of partition names (e.g., **fasse,test** )
  custom_email_address:
    label: (optional) email address for job status notification
    widget: text_field
  custom_memory_per_node:
    label: Memory Allocation in GB
    value: 8
    min:   1
    step:  1
    max:   2000
    widget: number_field
    help: |
      *sbatch --mem=\<size\>G*
  custom_num_cores:
    label: "Number of CPUs to allocate"
    value: 2
    min:   1
    step:  1
    widget: number_field
    help: |
      *sbatch -c, --cpus-per-task=\<ncpus\>*
  r_version:
    widget: select
    label: "R version"
# site-specific: change versions and location of containers
    options:
      - [ "R 4.4.2 (Bioconductor 3.20, RStudio 2024.12.0)", "/n/sw/singularity_images/informatics/ifxrstudio/ifxrstudio:RELEASE_3_20.sif" ]
      - [ "R 4.4.1 (Bioconductor 3.19, RStudio 2024.04.2)", "/n/sw/singularity_images/informatics/ifxrstudio/ifxrstudio:RELEASE_3_19.sif" ]
      - [ "R 4.3.3 (Bioconductor 3.18, RStudio 2023.09.1)", "/n/sw/singularity_images/informatics/ifxrstudio/ifxrstudio:RELEASE_3_18.sif" ]
      - [ "R 4.2.3 (Bioconductor 3.16, RStudio 2023.03.0)", "/n/sw/singularity_images/informatics/ifxrstudio/ifxrstudio:RELEASE_3_16.sif" ]
      - [ "R 4.2.0 (Bioconductor 3.15, RStudio 2022.02.3)", "/n/sw/singularity_images/informatics/ifxrstudio/ifxrstudio:RELEASE_3_15.sif" ]
      - [ "R 3.6.2 (Bioconductor 3.10, Rstudio 1.2.5033)", "/n/sw/singularity_images/informatics/ifxrstudio/ifxrstudio:RELEASE_3_10.sif" ]
    help: |
      This defines the version of R/Bioconductor you want to use.

  custom_reservation:
    label: "(optional) Slurm Reservation"
    widget: text_field
    help: |
      *sbatch --reservation=\<name\>*

      Leave blank if you do not have a Slurm reservation

  bc_account:
    label: "(optional) Slurm Account"
    help: |
      *sbatch -A, --account=\<account\>*

      Leave blank if you do not have multiple Slurm accounts

  custom_vanillaconf:
    label: "Start RStudio with a new user state directory"
    widget: check_box
    value: 1
    help: |
          **_Checking this box will start RStudio with a temporary [user state directory](https://docs.posit.co/ide/server-pro/admin/rstudio_pro_sessions/workspace_management.html#user-state-storage) (`~/.local/share/rstudio`) that will persist only for the duration of the session._** 
          
          This is useful for running multiple RStudio sessions, avoiding large autosaves in $HOME, or bypassing issues from old sessions.

          Leave the box unchecked if you want RStudio reuse existing RStudio session data in ~/.local/config/rstudio.
          New session data will also be saved there.

  extra_slurm:
    label: Additional Slurm options
    widget: text_field
    help: |
      additional slurm options (**long format option only**)<br>
      Example :  --constraint=intel --exclusive

      Please make sure the options you select are compatible with other fields in the form.<br>Also, please make sure you use **long format option only**<br>(e.g. --nodelist=holy7c24502 instead of -w holy7c24502)

form:
  - modules
  - bc_queue
  - custom_memory_per_node
  - custom_num_cores
  - custom_time
  - r_version
  - bc_email_on_started
  - custom_email_address
  - custom_reservation
  - custom_vanillaconf
  - bc_account
  - extra_slurm
